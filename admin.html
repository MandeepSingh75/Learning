<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Hub — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A2B3C;
    --sage: #8DAA91;
    --sage-light: #d4e4d6;
    --cream: #faf8f5;
    --white: #ffffff;
    --muted: #8a8f9a;
    --danger: #c0392b;
    --success: #27ae60;
    --border: #e8e4de;
    --shadow: 0 2px 20px rgba(26,43,60,0.08);
    --shadow-lg: 0 8px 40px rgba(26,43,60,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--ink);
    position: relative;
    overflow: hidden;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(141,170,145,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
  }

  #login-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(141,170,145,0.1) 0%, transparent 70%);
    bottom: -50px; left: -50px;
  }

  .login-card {
    background: var(--white);
    border-radius: 20px;
    padding: 3rem;
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
    box-shadow: var(--shadow-lg);
  }

  .login-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }

  .login-subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(141,170,145,0.2);
    background: white;
  }

  textarea {
    resize: vertical;
    min-height: 140px;
    line-height: 1.6;
  }

  .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .hint a { color: var(--sage); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 1.75rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--ink);
    color: white;
    width: 100%;
    justify-content: center;
  }

  .btn-primary:hover { background: #253d52; transform: translateY(-1px); box-shadow: var(--shadow); }

  .btn-sage {
    background: var(--sage);
    color: white;
  }

  .btn-sage:hover { background: #7a9880; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1.5px solid #f0d0ce;
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
  }

  .btn-danger:hover { background: #fdf0ef; }

  /* ── MAIN LAYOUT ── */
  #app { display: none; }

  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
  }

  .topbar-brand span {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    background: var(--sage-light);
    color: var(--sage);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-weight: 600;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    margin-right: 0.3rem;
  }

  .repo-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--cream);
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .logout-btn:hover { background: var(--cream); color: var(--ink); }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0.25rem;
    background: var(--white);
    border-radius: 12px;
    padding: 0.35rem;
    border: 1px solid var(--border);
    margin-bottom: 2rem;
    width: fit-content;
  }

  .tab {
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--ink);
    color: white;
  }

  /* ── ENTRIES LIST ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
  }

  .entry-count {
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
  }

  .entries-list { display: flex; flex-direction: column; gap: 1rem; }

  .entry-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .entry-card:hover { border-color: var(--sage); box-shadow: var(--shadow); }

  .entry-info { flex: 1; }

  .entry-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .entry-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .entry-preview {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .entry-tags { margin-top: 0.75rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .tag-pill {
    background: var(--sage-light);
    color: var(--sage);
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .entry-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

  /* ── ADD ENTRY FORM ── */
  .form-card {
    background: var(--white);
    border-radius: 16px;
    padding: 2rem;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
  }

  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 1.75rem;
    color: var(--ink);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  .form-full { grid-column: 1 / -1; }

  .form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1.75rem;
    align-items: center;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--ink);
    color: white;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    max-width: 350px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--success); }
  #toast.error { background: var(--danger); }

  /* ── LOADING ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.95rem; }

  .loading-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }

  .publish-status {
    font-size: 0.85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .error-msg {
    background: #fdf0ef;
    color: var(--danger);
    border: 1px solid #f0d0ce;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    margin-top: 1rem;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .topbar { padding: 0 1rem; }
    .main { padding: 1rem 1rem 4rem; }
    .login-card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Learning Hub</div>
    <div class="login-subtitle">Admin Portal — Connect your GitHub to get started</div>

    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="gh-user" placeholder="e.g. johndoe" autocomplete="username">
    </div>

    <div class="field">
      <label>Repository Name</label>
      <input type="text" id="gh-repo" placeholder="e.g. my-learning-hub">
    </div>

    <div class="field">
      <label>Personal Access Token</label>
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <div class="hint">
        Generate one at <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">github.com/settings/tokens</a> — needs <strong>repo</strong> scope. Never shared or stored on any server.
      </div>
    </div>

    <div class="field">
      <label>Branch</label>
      <input type="text" id="gh-branch" placeholder="main" value="main">
    </div>

    <button class="btn btn-primary" onclick="login()" id="login-btn">
      Connect to GitHub →
    </button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      Learning Hub <span>ADMIN</span>
    </div>
    <div class="topbar-right">
      <span class="repo-badge" id="repo-display"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('entries', this)">📋 All Entries</button>
      <button class="tab" onclick="switchTab('add', this)">✏️ Add Entry</button>
    </div>

    <!-- ENTRIES TAB -->
    <div id="tab-entries">
      <div class="section-header">
        <div class="section-title">Your Entries</div>
        <span class="entry-count" id="entry-count">Loading...</span>
      </div>
      <div id="entries-list">
        <div class="loading-state">Loading your entries…</div>
      </div>
    </div>

    <!-- ADD ENTRY TAB -->
    <div id="tab-add" style="display:none">
      <div class="form-card">
        <div class="form-title" id="form-title">New Entry</div>
        <div class="form-grid">
          <div class="field">
            <label>Date</label>
            <input type="text" id="f-date" placeholder="March 2, 2026">
          </div>
          <div class="field">
            <label>Entry Number</label>
            <input type="text" id="f-num" placeholder="002">
          </div>
          <div class="field form-full">
            <label>Title</label>
            <input type="text" id="f-title" placeholder="What did you learn today?">
          </div>
          <div class="field form-full">
            <label>Content</label>
            <textarea id="f-content" placeholder="Write about your learning experience..."></textarea>
          </div>
          <div class="field form-full">
            <label>Tags (comma separated)</label>
            <input type="text" id="f-tags" placeholder="Web Dev, CSS, JavaScript">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-sage" onclick="publishEntry()" id="publish-btn">
            🚀 Publish to Website
          </button>
          <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
          <span class="publish-status" id="publish-status"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let config = {};
let currentHtml = '';
let entries = [];
let editingIndex = null;

// ── UTILITIES ──
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3500);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-entries').style.display = tab === 'entries' ? '' : 'none';
  document.getElementById('tab-add').style.display = tab === 'add' ? '' : 'none';
  if (tab === 'entries') loadEntries();
}

// ── AUTH ──
function login() {
  const user = document.getElementById('gh-user').value.trim();
  const repo = document.getElementById('gh-repo').value.trim();
  const token = document.getElementById('gh-token').value.trim();
  const branch = document.getElementById('gh-branch').value.trim() || 'main';

  if (!user || !repo || !token) {
    document.getElementById('login-error').innerHTML = '<div class="error-msg">Please fill in all fields.</div>';
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span> Connecting…';
  btn.disabled = true;

  config = { user, repo, token, branch };

  // Test connection
  fetch(`https://api.github.com/repos/${user}/${repo}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  }).then(r => {
    if (!r.ok) throw new Error('Repository not found or token invalid.');
    return r.json();
  }).then(() => {
    sessionStorage.setItem('lhub_config', JSON.stringify(config));
    showApp();
  }).catch(e => {
    document.getElementById('login-error').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
    btn.innerHTML = 'Connect to GitHub →';
    btn.disabled = false;
  });
}

function logout() {
  sessionStorage.removeItem('lhub_config');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  config = {};
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('repo-display').textContent = `${config.user}/${config.repo}`;
  loadEntries();
}

// ── GITHUB API ──
async function getFile() {
  const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/index.html?ref=${config.branch}`;
  const r = await fetch(url, {
    headers: { Authorization: `token ${config.token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error('Could not fetch index.html from your repo.');
  return await r.json();
}

async function putFile(content, sha, message) {
  const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/index.html`;
  const r = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `token ${config.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: config.branch })
  });
  if (!r.ok) {
    const d = await r.json();
    throw new Error(d.message || 'Failed to update file.');
  }
  return await r.json();
}

// ── ENTRIES ──
function parseEntries(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const cards = doc.querySelectorAll('.container .card');
  return Array.from(cards).map(card => ({
    date: card.querySelector('.date')?.textContent?.trim() || '',
    title: card.querySelector('h2')?.textContent?.replace(/^Entry \d+:\s*/, '') || '',
    num: (card.querySelector('h2')?.textContent?.match(/Entry (\d+):/) || ['', ''])[1],
    content: card.querySelector('p')?.textContent?.trim() || '',
    tags: Array.from(card.querySelectorAll('.tag')).map(t => t.textContent.trim())
  }));
}

async function loadEntries() {
  document.getElementById('entries-list').innerHTML = '<div class="loading-state">Loading…</div>';
  try {
    const file = await getFile();
    currentHtml = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
    window._fileSha = file.sha;
    entries = parseEntries(currentHtml);
    renderEntries();
  } catch (e) {
    document.getElementById('entries-list').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

function renderEntries() {
  document.getElementById('entry-count').textContent = `${entries.length} entries`;
  const list = document.getElementById('entries-list');

  if (entries.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>No entries yet. Add your first one!</p></div>`;
    return;
  }

  list.innerHTML = entries.map((e, i) => `
    <div class="entry-card">
      <div class="entry-info">
        <div class="entry-date">${e.date}</div>
        <div class="entry-title">Entry ${e.num}: ${e.title}</div>
        <div class="entry-preview">${e.content}</div>
        <div class="entry-tags">${e.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>
      </div>
      <div class="entry-actions">
        <button class="btn btn-ghost" onclick="editEntry(${i})" style="font-size:0.8rem;padding:0.5rem 1rem;">Edit</button>
        <button class="btn btn-danger" onclick="deleteEntry(${i})">Delete</button>
      </div>
    </div>
  `).join('');
}

function editEntry(i) {
  const e = entries[i];
  editingIndex = i;
  document.getElementById('f-date').value = e.date;
  document.getElementById('f-num').value = e.num;
  document.getElementById('f-title').value = e.title;
  document.getElementById('f-content').value = e.content;
  document.getElementById('f-tags').value = e.tags.join(', ');
  document.getElementById('form-title').textContent = 'Edit Entry';
  document.getElementById('publish-btn').textContent = '💾 Save Changes';

  // Switch to add tab
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i===1));
  document.getElementById('tab-entries').style.display = 'none';
  document.getElementById('tab-add').style.display = '';
}

async function deleteEntry(i) {
  if (!confirm(`Delete "${entries[i].title}"? This cannot be undone.`)) return;
  try {
    const file = await getFile();
    currentHtml = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
    window._fileSha = file.sha;
    const newHtml = rebuildHtml(currentHtml, null, i);
    await putFile(newHtml, file.sha, `🗑️ Delete entry: ${entries[i].title}`);
    toast('Entry deleted!', 'success');
    loadEntries();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

function clearForm() {
  ['f-date','f-num','f-title','f-content','f-tags'].forEach(id => document.getElementById(id).value = '');
  editingIndex = null;
  document.getElementById('form-title').textContent = 'New Entry';
  document.getElementById('publish-btn').textContent = '🚀 Publish to Website';
  document.getElementById('publish-status').textContent = '';
}

function makeCard(entry) {
  const tags = entry.tags.map(t => `            <span class="tag">${t.trim()}</span>`).join('\n');
  return `        <div class="card">
            <span class="date">${entry.date}</span>
            <h2>Entry ${String(entry.num).padStart(3,'0')}: ${entry.title}</h2>
            <p>${entry.content}</p>
${tags}
        </div>`;
}

function rebuildHtml(html, newEntry, deleteIndex) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const container = doc.querySelector('.container');
  const cards = Array.from(container.querySelectorAll('.card'));

  if (deleteIndex !== null && deleteIndex !== undefined) {
    cards[deleteIndex].remove();
  } else if (editingIndex !== null && editingIndex !== undefined) {
    const card = cards[editingIndex];
    card.querySelector('.date').textContent = newEntry.date;
    card.querySelector('h2').textContent = `Entry ${String(newEntry.num).padStart(3,'0')}: ${newEntry.title}`;
    card.querySelector('p').textContent = newEntry.content;
    card.querySelectorAll('.tag').forEach(t => t.remove());
    newEntry.tags.forEach(tag => {
      const s = doc.createElement('span');
      s.className = 'tag';
      s.textContent = tag.trim();
      card.appendChild(s);
    });
  } else if (newEntry) {
    const div = doc.createElement('div');
    div.innerHTML = makeCard(newEntry);
    container.insertBefore(div.firstChild, container.firstChild);
  }

  return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
}

async function publishEntry() {
  const date = document.getElementById('f-date').value.trim();
  const num = document.getElementById('f-num').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const content = document.getElementById('f-content').value.trim();
  const tagsRaw = document.getElementById('f-tags').value.trim();

  if (!date || !title || !content) {
    toast('Please fill in Date, Title, and Content.', 'error');
    return;
  }

  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const entry = { date, num: num || (entries.length + 1), title, content, tags };

  const btn = document.getElementById('publish-btn');
  const status = document.getElementById('publish-status');
  btn.innerHTML = '<span class="spinner"></span> Publishing…';
  btn.disabled = true;
  status.textContent = 'Fetching current file…';

  try {
    const file = await getFile();
    currentHtml = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
    status.textContent = 'Building new HTML…';
    const newHtml = rebuildHtml(currentHtml, entry);
    status.textContent = 'Committing to GitHub…';
    const action = editingIndex !== null ? 'Edit' : 'Add';
    await putFile(newHtml, file.sha, `${action === 'Add' ? '✨' : '✏️'} ${action} entry: ${title}`);
    toast(`Entry ${action === 'Add' ? 'published' : 'updated'} successfully! Site will update in ~30s.`, 'success');
    clearForm();
    editingIndex = null;
    status.textContent = '';
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    status.textContent = '';
  } finally {
    btn.innerHTML = editingIndex !== null ? '💾 Save Changes' : '🚀 Publish to Website';
    btn.disabled = false;
  }
}

// ── INIT ──
const saved = sessionStorage.getItem('lhub_config');
if (saved) {
  try {
    config = JSON.parse(saved);
    showApp();
  } catch(e) {}
}

const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
document.getElementById('f-date').value = today;
